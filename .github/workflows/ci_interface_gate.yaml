# .github/workflows/ci_interface_gate.yaml
# ─────────────────────────────────────────────────────────────────
# GĐ7 Interface Consistency Gate
# ─────────────────────────────────────────────────────────────────
# ALL tests must pass before merge is allowed.
# This gate enforces the ScoreResultDTO contract.
# ─────────────────────────────────────────────────────────────────
name: GĐ7 — Interface Gate

on:
  push:
    branches: [main, develop, "feature/**"]
    paths:
      - "backend/scoring/**"
      - "backend/api/**"
      - "backend/main_controller.py"
      - "tests/interface/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/scoring/**"
      - "backend/api/**"
      - "backend/main_controller.py"
      - "tests/interface/**"

concurrency:
  group: interface-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Interface Contract Tests
  # ============================================================
  interface_gate:
    runs-on: ubuntu-latest
    name: "GĐ7 Interface Contract"
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-interface-${{ runner.os }}-${{ hashFiles('requirements*.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_data_pipeline.txt
          pip install pytest pytest-asyncio

      - name: Verify ScoreResultDTO exists
        run: |
          python -c "
          from backend.scoring.dto import ScoreResultDTO, _validate_dto
          print('✓ ScoreResultDTO imported successfully')
          print('✓ _validate_dto imported successfully')
          "
        env:
          PYTHONPATH: .

      - name: Run interface contract tests
        run: |
          python -m pytest tests/interface/ \
            -v \
            --tb=short \
            -x \
            --strict-markers
        env:
          PYTHONPATH: .

      - name: Verify no legacy fields in allowed scope
        run: |
          echo "Checking for legacy fields in allowed scope..."
          LEGACY_PATTERN='(\.final_score|["\047]final_score["\047]|\.skill_score|["\047]skill_score["\047]|\.legacy_score|["\047]legacy_score["\047]|\.normalized_score|["\047]normalized_score["\047])'
          
          # Search files (excluding comments and docstrings)
          FOUND=$(grep -rE "$LEGACY_PATTERN" backend/scoring backend/api backend/main_controller.py \
            --include="*.py" \
            | grep -vE "^[^:]*:\s*#" \
            | grep -vE "docstring|FORBIDDEN|No final_score|use total_score|REMOVED|use components" \
            || true)
          
          if [ -n "$FOUND" ]; then
            echo "❌ FAIL: Legacy fields detected:"
            echo "$FOUND"
            exit 1
          else
            echo "✓ No legacy fields found"
          fi
        env:
          PYTHONPATH: .

      - name: Verify DTO type enforcement
        run: |
          python -c "
          from backend.scoring.dto import ScoreResultDTO, _validate_dto
          
          # Test 1: Valid DTO should pass
          valid = ScoreResultDTO(
              career_id='test',
              total_score=0.5,
              components={'study': 0.5, 'interest': 0.5, 'market': 0.5, 'growth': 0.5, 'risk': 0.5},
              rank=1,
              meta={}
          )
          _validate_dto(valid)
          print('✓ Valid DTO accepted')
          
          # Test 2: Dict should be rejected
          try:
              _validate_dto({'career_id': 'test'})
              print('❌ FAIL: Dict was not rejected')
              exit(1)
          except TypeError:
              print('✓ Dict rejected correctly')
          
          # Test 3: Immutability
          try:
              valid.total_score = 0.9
              print('❌ FAIL: DTO is mutable')
              exit(1)
          except:
              print('✓ DTO is immutable')
          
          print('')
          print('========================================')
          print('GĐ7 INTERFACE GATE: PASS')
          print('========================================')
          "
        env:
          PYTHONPATH: .

  # ============================================================
  # Merge Gate Status
  # ============================================================
  merge_gate:
    runs-on: ubuntu-latest
    needs: interface_gate
    if: always()
    name: "Merge Gate Status"
    
    steps:
      - name: Check gate status
        run: |
          if [ "${{ needs.interface_gate.result }}" != "success" ]; then
            echo "❌ GĐ7 Interface Gate FAILED"
            echo "Merge is BLOCKED until all interface tests pass."
            exit 1
          fi
          echo "✓ GĐ7 Interface Gate PASSED"
          echo "Merge is ALLOWED."
