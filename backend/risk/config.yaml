version: "1.0"

# Risk Module Configuration - SIMGR Stage 3
# DO NOT HARDCODE - All values loaded from this file

# =============================================================================
# THRESHOLDS
# =============================================================================
thresholds:
  dropout_high: 0.3          # High dropout risk threshold
  dropout_medium: 0.15       # Medium dropout risk threshold
  unemployment_high: 0.15    # High unemployment risk threshold  
  unemployment_medium: 0.08  # Medium unemployment risk threshold
  cost_high: 50000           # High cost threshold (USD)
  cost_medium: 25000         # Medium cost threshold (USD)
  saturation_high: 0.7       # High market saturation threshold
  obsolescence_high: 0.6     # High skill obsolescence threshold

# =============================================================================
# COMPONENT WEIGHTS (must sum to 1.0)
# =============================================================================
weights:
  market_saturation: 0.25    # Market saturation risk weight
  skill_obsolescence: 0.20   # Skill obsolescence risk weight
  competition: 0.15          # Competition risk weight
  dropout: 0.15              # Dropout risk weight
  unemployment: 0.15         # Unemployment risk weight
  cost: 0.10                 # Cost barrier risk weight

# =============================================================================
# PENALTY CONFIGURATION
# =============================================================================
penalty:
  base_rate: 0.1             # Base penalty rate
  scaling_factor: 1.5        # Penalty scaling factor
  max_penalty: 0.95          # Maximum penalty value
  min_penalty: 0.0           # Minimum penalty value

# =============================================================================
# MODEL PARAMETERS
# =============================================================================
model:
  dropout:
    education_weight: 0.3
    history_weight: 0.4
    engagement_weight: 0.3
    
  unemployment:
    sector_weight: 0.4
    region_weight: 0.3
    trend_weight: 0.3
    
  cost:
    education_weight: 0.5
    time_weight: 0.3
    opportunity_weight: 0.2

# =============================================================================
# DATA SOURCES
# =============================================================================
data:
  unemployment:
    path: "data/risk/unemployment/rates.csv"
    version: "2026-01"
    checksum_enabled: true
    cache_ttl_hours: 24
    
  costs:
    path: "data/risk/costs/education_costs.csv"
    version: "2026-01"
    
  sectors:
    path: "data/risk/sectors/sector_risk.csv"
    version: "2026-01"

# =============================================================================
# VALIDATION
# =============================================================================
validation:
  require_dataset: true
  require_checksum: false
  min_samples: 10
  max_staleness_days: 90

# =============================================================================
# METADATA
# =============================================================================
metadata:
  created_at: "2026-02-16"
  updated_at: "2026-02-16"
  author: "SIMGR Compliance System"
  description: "Risk module configuration - SIMGR Stage 3 compliant"
