      note: "Uses dedicated AdminController, not MainController"
    service:
      name: "AdminAuthService"
      files:
        - "backend/modules/admin_auth/service.py"
    interface:
      - method: "POST /api/admin/login"
        handler: "admin_login"
        auth: PUBLIC
      - method: "POST /api/admin/refresh"
        handler: "admin_refresh"
        auth: PUBLIC
      - method: "POST /api/admin/logout"
        handler: "admin_logout"
        auth: USER

