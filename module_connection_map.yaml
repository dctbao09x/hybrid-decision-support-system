# Module Connection Map
# DOC: MODULE_REGISTRY.md compliance
# Generated: 2026-02-16
# Status: NORMALIZED

version: "1.0.0"
architecture: "Hybrid Semi-API Decision System"

# ═══════════════════════════════════════════════════════════════════════════
# Connection Flow (per DOC CONTROLLER_SPEC.md)
# ═══════════════════════════════════════════════════════════════════════════
#
#   Client
#     ↓
#   Router
#     ↓
#   router_registry.py
#     ↓
#   main_controller.py
#     ↓
#   Service Layer
#     ↓
#   Decision Engine (Local)
#     ↓
#   LLM/API (Explain only)
#
# ═══════════════════════════════════════════════════════════════════════════

modules:
  # ─────────────────────────────────────────────────────────────────────────
  # SCORING MODULE
  # ─────────────────────────────────────────────────────────────────────────
  scoring:
    location: "backend/scoring/"
    status: REGISTERED
    router:
      file: "backend/api/routers/scoring_router.py"
      prefix: "/api/v1/scoring"
      registered_in: "router_registry.py"
    controller:
      name: "MainController"
      dispatch_method: "dispatch('scoring', action, payload)"
      injection: "set_main_controller()"
    service:
      name: "ScoringService"
      files:
        - "backend/scoring/scoring.py"          # SIMGRScorer
        - "backend/scoring/engine.py"           # RankingEngine
        - "backend/scoring/calculator.py"       # SIMGRCalculator
    components:
      - name: "study"
        file: "backend/scoring/components/study.py"
        status: ACTIVE
      - name: "interest"
        file: "backend/scoring/components/interest.py"
        status: ACTIVE
      - name: "market"
        file: "backend/scoring/components/market.py"
        status: ACTIVE
      - name: "growth"
        file: "backend/scoring/components/growth.py"
        status: ACTIVE
      - name: "risk"
        file: "backend/scoring/components/risk.py"
        status: ACTIVE
    interface:
      - method: "POST /api/v1/scoring/rank"
        handler: "rank_careers_for_user"
        auth: USER
      - method: "POST /api/v1/scoring/score"
        handler: "score_careers"
        auth: USER
      - method: "GET /api/v1/scoring/weights"
        handler: "get_weights"
        auth: USER
      - method: "PUT /api/v1/scoring/weights"
        handler: "update_weights"
        auth: ADMIN
      - method: "GET /api/v1/scoring/health"
        handler: "scoring_health"
        auth: PUBLIC

  # ─────────────────────────────────────────────────────────────────────────
  # FEEDBACK MODULE
  # ─────────────────────────────────────────────────────────────────────────
  feedback:
    location: "backend/feedback/"
    status: REGISTERED
    router:
      file: "backend/feedback/router.py"
      prefix: "/api/v1/infer/feedback"
      registered_in: "router_registry.py"
    controller:
      name: "MainController"
      dispatch_method: "dispatch('feedback', action, payload)"
      note: "Currently bypasses - needs refactor"
    service:
      name: "FeedbackService"
      files:
        - "backend/feedback/storage.py"
        - "backend/feedback/analytics.py"
        - "backend/feedback/governance.py"
    interface:
      - method: "POST /api/v1/infer/feedback/review"
        handler: "submit_feedback"
        auth: USER
      - method: "GET /api/v1/infer/feedback/link/{trace_id}"
        handler: "get_trace_feedback"
        auth: USER
      - method: "GET /api/v1/infer/feedback/stats"
        handler: "get_feedback_stats"
        auth: ADMIN
      - method: "GET /api/v1/infer/feedback/export"
        handler: "export_feedback"
        auth: ADMIN

  # ─────────────────────────────────────────────────────────────────────────
  # MARKET MODULE (NEW - Just registered)
  # ─────────────────────────────────────────────────────────────────────────
  market:
    location: "backend/market/"
    status: REGISTERED  # Was DEAD, now registered
    router:
      file: "backend/market/router.py"
      prefix: "/api/v1/market"
      registered_in: "router_registry.py"
    controller:
      name: "MainController"
      dispatch_method: "dispatch('market', action, payload)"
    service:
      name: "MarketService"
      files:
        - "backend/market/signal/collector.py"
        - "backend/market/taxonomy/engine.py"
        - "backend/market/trends/detector.py"
        - "backend/market/forecast/engine.py"
        - "backend/market/gap/analyzer.py"
        - "backend/market/scoring/adapter.py"
        - "backend/market/evolution/orchestrator.py"
        - "backend/market/governance/engine.py"
    components:
      - name: "signal"
        file: "backend/market/signal/"
        status: ACTIVE
      - name: "taxonomy"
        file: "backend/market/taxonomy/"
        status: ACTIVE
      - name: "trends"
        file: "backend/market/trends/"
        status: ACTIVE
      - name: "forecast"
        file: "backend/market/forecast/"
        status: ACTIVE
      - name: "gap"
        file: "backend/market/gap/"
        status: ACTIVE
      - name: "evolution"
        file: "backend/market/evolution/"
        status: ACTIVE
      - name: "governance"
        file: "backend/market/governance/"
        status: ACTIVE
    interface:
      - method: "GET /api/v1/market/health"
        handler: "health_check"
        auth: PUBLIC
      - method: "POST /api/v1/market/signal/crawl"
        handler: "trigger_crawl"
        auth: ADMIN
      - method: "POST /api/v1/market/trends/analyze"
        handler: "analyze_trends"
        auth: USER
      - method: "POST /api/v1/market/forecast/demand"
        handler: "forecast_demand"
        auth: USER
      - method: "POST /api/v1/market/gap/analyze"
        handler: "analyze_gap"
        auth: USER

