summary:
  total_modules: 17
  registered: 17
  unregistered: 0
  status: "ALL_CONNECTED"
  
  controller_mapping:
    MainController:
      - scoring
      - feedback
      - market
      - crawler
      - ml
      - mlops
      - eval
      - rules
      - taxonomy
      - kb
      - chat
      - governance
    ExplainController:
      - explain
    AdminController:
      - admin
      - admin_gateway
    LiveOpsController:
      - liveops

  dependency_injection_points:
    - "router_registry.setup_dependencies()"
    - "router_registry.setup_explain_controller()"
    - "router_registry.setup_liveops_command_engine()"

# ═══════════════════════════════════════════════════════════════════════════
# Compliance Status
# ═══════════════════════════════════════════════════════════════════════════

compliance:
  doc_reference: "MODULE_REGISTRY.md"
  rules:
    - rule: "All modules must register in router_registry"
      status: PASS
    - rule: "All modules must map to a controller"
      status: PASS
    - rule: "All modules must have standard interface"
      status: PASS
    - rule: "No direct service calls from routers"
      status: "PARTIAL - scoring, feedback need refactor"
  overall_status: "COMPLIANT_WITH_NOTES"
